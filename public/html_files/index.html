<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zpub Reader</title>
    <link rel="stylesheet" href="/css_files/index.css"> <!-- Absolute Path Fix -->

    <!--Favicon inserted-->
    <link rel="icon" type="image/png" href="/images/magnifying_glass.png">
</head>
<body>

<!--Main header-->
<header>
    <div class="container">
        <h1>ZPUB READER <span class="version">v1.2</span></h1>
        <nav>Digital Asset Vault ∙ Elitebook Node</nav>
    </div>
</header>

<!--Main section-->
<main class="container">
    <section id="vault-status">
        <h2>AVAILABLE ASSETS</h2>

        <!-- STABILITY WRAPPER: This prevents layout breaks -->
        <div class="ledger-wrapper">
            <table id="book-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="book-list">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>
    </section>

    
</main>
<!--Footer to close page...-->
<footer>
    <div class="container">
        <p>HOST: Ubuntu Live Server.</p>
        <p>ADMIN: 5cr4ppyz</p>
    </div>
</footer>

<!-- Inject the js script, defer make it load first-->
<script src="/js_files/index.js" defer></script>
</body>
</html>
